<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAXXA V1 | Unblocked Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <div class="logo-area">
            <h1>FLAXXA V1</h1>
            <p>stealth · proxy · unblocked</p>
        </div>
        <div class="action-buttons">
            <button class="action-btn" id="resetIframeBtn">↻ Reset View</button>
            <button class="action-btn" id="fullViewBtn">⊞ Expand</button>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" data-tab="games">🎮 GAMES</button>
        <button class="tab-btn" data-tab="apps">📱 APPS</button>
        <button class="tab-btn" data-tab="browser">🌐 PROXY BROWSER</button>
    </div>

    <div class="workspace">
        <div class="sidebar" id="sidebarContent"></div>
        <div class="iframe-panel" id="iframePanel">
            <div class="iframe-header">
                <h3 id="activeTitle">📺 FLAXXA VIEWER</h3>
                <div>
                    <span class="resize-note">↘︎ drag corner</span>
                    <button class="close-iframe" id="closeIframeBtn">✕ clear</button>
                </div>
            </div>
            <div id="iframeDynamicArea" style="height: 100%; display: flex; flex-direction: column;">
                <iframe id="mainFrame" src="about:blank" title="content"></iframe>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
